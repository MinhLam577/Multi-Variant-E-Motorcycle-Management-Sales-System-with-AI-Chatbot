<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1600 720"
     preserveAspectRatio="xMidYMid meet"
     width="100%" height="100%">
  <g>
    <!-- Electricity -->
    <text x="800" y="150"
          font-family="Montserrat, Poppins, Arial, sans-serif"
          font-size="150"
          font-weight="600"
          letter-spacing="6"
          text-anchor="middle"
          fill="#ffffff">
      ELECTRICITY
    </text>

    <!-- MDT (bigger, fills frame) -->
    <text x="800" y="620"
          font-family="Montserrat, Poppins, Arial, sans-serif"
          font-size="520"
          font-weight="800"
          letter-spacing="0"
          text-anchor="middle">
      <tspan fill="#6DBD45">MD</tspan>
      <tspan dx="-105"
             fill="#FFFFFF"
             stroke="#1B51A3"
             stroke-width="30"
             paint-order="stroke fill">T</tspan>
    </text>

    <!-- Lightning bolt (scaled/positioned for bigger text) -->
    <path d="M955 170
             L870 315
             H940
             L845 460
             L1045 270
             H970
             Z"
          fill="#6DBD45"
          stroke="#1B51A3"
          stroke-width="18"
          stroke-linejoin="round"/>
  </g>
</svg>
